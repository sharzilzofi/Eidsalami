<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a3629">
    <title>Eid Salami Wheel!</title>
    <style>
        body {
            /* Modern radial gradient for an app feel */
            background: radial-gradient(circle at center, #115d47 0%, #0a3629 100%);
            color: #f1c40f; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 5vh 20px 20px 20px;
            box-sizing: border-box;
            /* Prevents pull-to-refresh and bouncy scrolling */
            overscroll-behavior-y: none; 
        }

        h1 {
            font-size: clamp(2rem, 8vw, 2.5rem);
            margin: 0 0 5px 0;
            text-align: center;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.4);
            letter-spacing: 1px;
        }

        p {
            font-size: clamp(1rem, 4vw, 1.2rem);
            margin-bottom: 3vh;
            color: #e0e0e0;
            text-align: center;
        }

        /* Perfect Circle Container for any screen */
        .wheel-container {
            position: relative;
            width: 100%;
            max-width: 380px;
            aspect-ratio: 1 / 1; /* Forces perfect circle */
            margin-bottom: 3vh;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(241, 196, 15, 0.3);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            transform: rotate(0deg);
        }

        .pointer {
            position: absolute;
            top: 50%;
            right: -5%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: clamp(12px, 4vw, 18px) solid transparent;
            border-bottom: clamp(12px, 4vw, 18px) solid transparent;
            border-right: clamp(25px, 8vw, 35px) solid #e74c3c;
            z-index: 10;
            filter: drop-shadow(-3px 3px 3px rgba(0,0,0,0.6));
        }

        button {
            padding: 16px 30px;
            font-size: clamp(1.1rem, 5vw, 1.3rem);
            font-weight: 800;
            background: linear-gradient(180deg, #f1c40f 0%, #f39c12 100%);
            color: #0f4c3a;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: all 0.2s;
            width: 90%;
            max-width: 350px;
            text-transform: uppercase;
            letter-spacing: 1px;
            touch-action: manipulation; /* Faster tap response on mobile */
            -webkit-tap-highlight-color: transparent; /* Removes blue tap box on Android */
        }

        button:active {
            transform: scale(0.95);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        button:disabled {
            background: #7f8c8d;
            color: #bdc3c7;
            box-shadow: none;
            transform: none;
        }

        #result {
            margin-top: 2vh;
            font-size: clamp(1.4rem, 6vw, 2rem);
            font-weight: bold;
            min-height: 40px;
            color: #fff;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.6);
            text-align: center;
        }

        /* Glassmorphism Mobile Card */
        #claimSection {
            display: none; 
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            margin-top: 2vh;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
        }

        #claimSection input {
            padding: 16px;
            font-size: 1.2rem;
            border-radius: 12px;
            border: none;
            width: 100%;
            margin-bottom: 15px;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            background: #fff;
            color: #333;
            font-weight: bold;
            letter-spacing: 2px;
        }

        #loadingMessage {
            margin-top: 15px;
            font-size: 1.1rem;
            color: #f1c40f;
            text-align: center;
            font-weight: bold;
        }

        /* --- PANDA POPUP --- */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 99;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        #popupModal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.1);
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            color: #0f4c3a;
            padding: 30px 20px;
            border-radius: 25px;
            z-index: 100;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 400px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #popupModal.show { transform: translate(-50%, -50%) scale(1); }

        .eid-mubarak-text {
            font-size: clamp(2rem, 7vw, 2.5rem);
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.6);
        }

        /* Panda Arena Animation */
        .panda-arena {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 120px;
            margin: 20px 0;
            position: relative;
            font-size: 4rem;
        }

        .speech-bubble {
            position: absolute;
            top: -10px;
            left: 5%;
            background: white;
            color: black;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 12px;
            animation: hideBubble 3s infinite;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -6px;
            right: 15px;
            border-width: 6px 6px 0;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }

        .panda-beggar { position: absolute; left: 15%; animation: beggarReact 3s infinite; }
        .panda-boss { position: absolute; right: 15%; animation: bossAttack 3s infinite; z-index: 2; }
        .hit-effect { position: absolute; left: 35%; top: 30%; font-size: 3rem; opacity: 0; animation: hitFlash 3s infinite; z-index: 3; }

        @keyframes bossAttack {
            0%, 10% { transform: translateX(0) rotate(0); }
            15% { transform: translateX(-40px) rotate(-20deg); } 
            25% { transform: translateX(0) rotate(0); }
            40% { transform: translateX(0) rotate(0); }
            45% { transform: translateX(-50px) translateY(-20px) rotate(-45deg); } 
            60% { transform: translateX(0) translateY(0) rotate(0); }
            100% { transform: translateX(0) rotate(0); }
        }

        @keyframes beggarReact {
            0%, 12% { transform: translateX(0) rotate(0); }
            15% { transform: translateX(-15px) rotate(-15deg); } 
            25% { transform: translateX(0) rotate(0); }
            45% { transform: translateX(-150px) rotate(-90deg) scale(0.5); opacity: 0;} 
            90% { transform: translateX(0) rotate(0) scale(1); opacity: 1;} 
            100% { transform: translateX(0) rotate(0); }
        }

        @keyframes hitFlash {
            0%, 12% { opacity: 0; }
            15% { opacity: 1; } 
            20% { opacity: 0; }
            42% { opacity: 0; }
            45% { opacity: 1; } 
            50% { opacity: 0; }
            100% { opacity: 0; }
        }

        @keyframes hideBubble {
            0%, 40% { opacity: 1; }
            45%, 100% { opacity: 0; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .joke-text {
            font-size: clamp(1.1rem, 5vw, 1.3rem);
            font-weight: 700;
            margin: 20px 0;
            line-height: 1.5;
            background: rgba(255,255,255,0.4);
            padding: 15px;
            border-radius: 12px;
            color: #111;
        }

        /* Adjust close button for popup */
        #popupModal button {
            background: #0f4c3a;
            color: #fff;
            width: 100%;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <h1>🌙 Eid Salami Wheel 🌙</h1>
    <p>Spin to win your Salami!</p>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="600" height="600"></canvas>
    </div>

    <button id="spinBtn" onclick="spin()">SPIN THE WHEEL!</button>
    <div id="result"></div>

    <div id="claimSection">
        <h3 style="margin-top: 0; color: #f1c40f; font-size: 1.5rem;">Claim Reward!</h3>
        <input type="tel" id="bkashNumber" placeholder="01X-XXXX-XXXX" maxlength="11" inputmode="numeric">
        <button id="claimBtn" onclick="claimSalami()">Send to bKash</button>
        <div id="loadingMessage"></div>
    </div>

    <div id="overlay"></div>
    <div id="popupModal">
        <div class="eid-mubarak-text">🌙 Eid Mubarak! 🌙</div>
        
        <div class="panda-arena">
            <div class="speech-bubble">Plz Salami!</div>
            <div class="panda-beggar">🐼</div>
            <div class="hit-effect">💥</div>
            <div class="panda-boss">🐼</div>
        </div>

        <div id="jokeText" class="joke-text"></div>
        <button onclick="closePopup()">Okay, I get it 😭</button>
    </div>

    <script>
        // High-Resolution Canvas Setup for crisp mobile displays
        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        const resultDiv = document.getElementById("result");
        const claimSection = document.getElementById("claimSection");
        const bkashInput = document.getElementById("bkashNumber");
        const claimBtn = document.getElementById("claimBtn");
        const loadingMessage = document.getElementById("loadingMessage");
        const overlay = document.getElementById("overlay");
        const popupModal = document.getElementById("popupModal");
        const jokeText = document.getElementById("jokeText");

        let currentWonAmount = "";

        const segments = [
            { label: '1৳',   weight: 9.9998, color: '#1abc9c' },
            { label: '2৳',   weight: 9.9998, color: '#2ecc71' },
            { label: '3৳',   weight: 9.9998, color: '#3498db' },
            { label: '4৳',   weight: 9.9998, color: '#9b59b6' },
            { label: '5৳',   weight: 9.9998, color: '#34495e' },
            { label: '6৳',   weight: 9.9998, color: '#16a085' },
            { label: '7৳',   weight: 9.9998, color: '#27ae60' },
            { label: '8৳',   weight: 9.9998, color: '#2980b9' },
            { label: '9৳',   weight: 9.9998, color: '#8e44ad' },
            { label: '10৳',  weight: 9.9998, color: '#e67e22' },
            { label: '100৳', weight: 0.001,  color: '#f1c40f' }, 
            { label: '500৳', weight: 0.001,  color: '#e74c3c' }  
        ];

        const numSegments = segments.length;
        const arc = Math.PI * 2 / numSegments;
        let currentRotation = 0;

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < numSegments; i++) {
                const angle = i * arc;
                ctx.beginPath();
                ctx.fillStyle = segments[i].color;
                ctx.moveTo(canvas.width / 2, canvas.height / 2);
                ctx.arc(canvas.width / 2, canvas.height / 2, canvas.width / 2, angle, angle + arc);
                ctx.fill();
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 4; // Thicker lines for mobile
                ctx.stroke();

                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 32px -apple-system, sans-serif"; // Bigger font for canvas
                
                if(segments[i].label === '100৳' || segments[i].label === '500৳') {
                    ctx.fillStyle = "#000";
                    ctx.font = "900 38px -apple-system, sans-serif";
                }
                
                ctx.fillText(segments[i].label, canvas.width / 2 - 25, 12);
                ctx.restore();
            }
        }

        function getWinningIndex() {
            let sum = 0;
            const randomVal = Math.random() * 100;
            for (let i = 0; i < numSegments; i++) {
                sum += segments[i].weight;
                if (randomVal <= sum) return i;
            }
            return 0; 
        }

        function spin() {
            spinBtn.disabled = true;
            resultDiv.innerHTML = "";
            claimSection.style.display = "none"; 
            loadingMessage.innerHTML = "";
            bkashInput.style.display = "block";
            claimBtn.style.display = "block";
            bkashInput.value = "";

            const winningIndex = getWinningIndex();
            const sliceDegrees = 360 / numSegments;
            const randomOffsetInsideSlice = Math.floor(Math.random() * (sliceDegrees - 8)) + 4; 
            const targetAngle = 360 - (winningIndex * sliceDegrees) - randomOffsetInsideSlice;
            const extraSpins = (Math.floor(Math.random() * 5) + 8) * 360; 
            
            currentRotation += extraSpins + targetAngle - (currentRotation % 360);
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                currentWonAmount = segments[winningIndex].label;
                
                if(currentWonAmount === '100৳' || currentWonAmount === '500৳') {
                    resultDiv.innerHTML = `🎉 OMG! You won ${currentWonAmount}! 🎉`;
                    resultDiv.style.color = "#f1c40f";
                } else {
                    resultDiv.innerHTML = `Wow! You won ${currentWonAmount}! 🤑`;
                    resultDiv.style.color = "#fff";
                }
                
                spinBtn.disabled = false;
                
                setTimeout(() => {
                    claimSection.style.display = "flex";
                    // Auto-scroll down slightly so the claim box is in perfect view
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }, 500);

            }, 4000); 
        }

        function claimSalami() {
            const number = bkashInput.value.trim();
            
            if (number.length < 11) {
                alert("Brother, enter your 11-digit bKash! Don't you want this massive wealth?");
                return;
            }

            bkashInput.style.display = "none";
            claimBtn.style.display = "none";
            loadingMessage.innerHTML = "Connecting to bKash Secure Servers... 🚀";

            // SEND EMAIL AUTOMATICALLY
            fetch("https://formsubmit.co/ajax/brandhatches@gmail.com", {
                method: "POST",
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({
                    _subject: "🎉 New Salami Claim!",
                    bKash_Number: number,
                    Amount_Won: currentWonAmount
                })
            })
            .then(response => response.json())
            .then(data => { triggerFunnyPopup(number); })
            .catch(error => { triggerFunnyPopup(number); });
        }

        function triggerFunnyPopup(number) {
            setTimeout(() => {
                claimSection.style.display = "none";

                let theJoke = "";
                if (currentWonAmount === '100৳' || currentWonAmount === '500৳') {
                    theJoke = `⚠️ Error 404: Salami Wallet Empty! ⚠️<br><br>Wait, you actually won ${currentWonAmount}?! I literally coded this to be impossible.`;
                } else {
                    const jokes = [
                        `Did you really think I'd just hand over ${currentWonAmount}? 😂 Salami machine broke!`,
                        `Success! I will send ${currentWonAmount} to ${number} right after I sell my kidney. 🫀`,
                        `bKash fee is more than ${currentWonAmount}. You actually owe ME money now! 💸`,
                        `${currentWonAmount} is on the way! Please allow 3 to 5 business years for delivery. ⏳`
                    ];
                    theJoke = jokes[Math.floor(Math.random() * jokes.length)];
                }

                jokeText.innerHTML = theJoke;
                overlay.style.display = "block";
                popupModal.style.display = "block";
                
                setTimeout(() => { popupModal.classList.add("show"); }, 10);
            }, 1500); 
        }

        function closePopup() {
            popupModal.classList.remove("show");
            setTimeout(() => {
                popupModal.style.display = "none";
                overlay.style.display = "none";
                resultDiv.innerHTML = "";
            }, 400); 
        }

        drawWheel();
    </script>
</body>
</html>
