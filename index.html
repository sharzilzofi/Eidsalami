<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Eid Card Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-blue: #0A1128;
            --night-blue: #162447;
            --gold: #F9A03F;
            --soft-gold: #F7D08A;
            --white: #F8F9FA;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--dark-blue), var(--night-blue));
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Starry Background --- */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #ffffff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 4s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* --- Global UI Elements --- */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1, h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            text-shadow: 0 0 10px rgba(249, 160, 63, 0.5);
            text-align: center;
            margin-bottom: 1rem;
        }

        .hidden { display: none !important; }

        .btn {
            background: linear-gradient(45deg, var(--gold), #e88a1a);
            color: var(--dark-blue);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(249, 160, 63, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(249, 160, 63, 0.6);
        }

        .btn-outline {
            background: transparent;
            color: var(--gold);
            border: 2px solid var(--gold);
            box-shadow: none;
        }

        /* --- Generator View --- */
        .card-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--soft-gold);
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(249, 160, 63, 0.3);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }

        .input-group input:focus, .input-group textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 8px rgba(249, 160, 63, 0.3);
        }

        #share-section {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .link-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 8px;
            word-break: break-all;
            font-size: 0.8rem;
            color: var(--soft-gold);
            margin-bottom: 1rem;
        }

        .counter {
            text-align: center;
            font-size: 0.85rem;
            margin-top: 1.5rem;
            color: rgba(255,255,255,0.6);
        }

        /* --- Card View: Intro --- */
        #card-intro {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
        }

        .moon {
            font-size: 5rem;
            text-shadow: 0 0 30px var(--soft-gold);
            margin-bottom: 1rem;
            animation: float 4s ease-in-out infinite;
            cursor: pointer;
            user-select: none;
        }

        .lantern-container {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .lantern {
            font-size: 3rem;
            transform-origin: top center;
            animation: swing 3s ease-in-out infinite alternate;
            cursor: pointer;
            user-select: none;
        }

        .lantern:nth-child(2) { animation-delay: 0.5s; animation-duration: 3.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes swing {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }

        /* --- Card View: Inside --- */
        #card-inside {
            animation: fadeSlideUp 1s ease forwards;
        }

        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .envelope {
            background: linear-gradient(135deg, #ffffff, #f0f0f0);
            border-radius: 15px;
            padding: 2.5rem 1.5rem;
            color: var(--dark-blue);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }

        .envelope h2 {
            color: var(--dark-blue);
            text-shadow: none;
        }

        .message-body {
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 1.5rem 0;
            min-height: 80px;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background-color: var(--dark-blue);
            vertical-align: middle;
            animation: blink 0.7s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .interactive-row {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .interact-item {
            font-size: 2.5rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .interact-item:hover { transform: scale(1.2); }

        .fun-ending {
            margin-top: 2rem;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 1.5rem;
        }

        .reaction-btns {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 1rem;
        }

        .reaction-btns button {
            background: rgba(10, 17, 40, 0.1);
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .reaction-btns button:hover { background: rgba(10, 17, 40, 0.2); }

        .card-actions { margin-top: 2rem; }

        /* --- Particles --- */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/audio/2022/04/27/audio_67b36f7596.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        
        <div id="generator-view" class="card-box hidden">
            <h1>✨ Eid Card Creator ✨</h1>
            <p style="margin-bottom: 2rem; color: var(--soft-gold);">Create a magical, personalized Eid greeting in seconds.</p>
            
            <div class="input-group">
                <label for="friend-name">Friend's Name *</label>
                <input type="text" id="friend-name" placeholder="e.g., Sara">
            </div>
            
            <div class="input-group">
                <label for="sender-name">Your Name (Optional)</label>
                <input type="text" id="sender-name" placeholder="e.g., Arif">
            </div>

            <div class="input-group">
                <label for="custom-msg">Short Message (Optional)</label>
                <textarea id="custom-msg" rows="3" placeholder="Wishing you a joyous Eid filled with love..."></textarea>
            </div>

            <button class="btn" onclick="generateLink()">Generate Eid Card</button>

            <div id="share-section" class="hidden">
                <p style="color: var(--soft-gold); margin-bottom: 10px;">Your magical link is ready! ✨</p>
                <div class="link-box" id="generated-link"></div>
                <button class="btn" onclick="copyLink()">Copy Link</button>
                <button class="btn btn-outline" style="margin-top: 10px;" onclick="shareNative()">Share via App</button>
            </div>

            <div class="counter">
                <span id="card-counter">✨ 1,234</span> Eid cards created today
            </div>
        </div>

        <div id="card-view" class="hidden">
            
            <div id="card-intro">
                <div class="lantern-container">
                    <div class="lantern" onclick="createStars(event)">🏮</div>
                    <div class="lantern" onclick="createStars(event)">🏮</div>
                </div>
                <div class="moon" onclick="createStars(event)">🌙</div>
                <h2 style="font-size: 2rem; margin: 1rem 0;">Eid Mubarak,<br><span id="display-friend-intro">Friend</span>!</h2>
                <button class="btn" onclick="openCard()">Open Your Eid Card ✨</button>
            </div>

            <div id="card-inside" class="hidden">
                <div class="envelope">
                    <h2>Eid Mubarak!</h2>
                    
                    <div class="message-body">
                        <span id="typed-text"></span><span class="cursor"></span>
                    </div>

                    <p style="font-weight: 600; color: var(--gold); margin-top: 1rem;">
                        From: <span id="display-sender">Someone special</span>
                    </p>

                    <div class="interactive-row">
                        <div class="interact-item" onclick="triggerConfetti(event)" title="Click for a surprise!">🎁</div>
                        <div class="interact-item" onclick="createStars(event)" title="Make it rain stars!">✨</div>
                    </div>

                    <div class="fun-ending">
                        <p style="font-size: 0.9rem; font-weight: 600;">Did this Eid card make you smile?</p>
                        <div class="reaction-btns">
                            <button onclick="showReaction('Yay! Eid Mubarak! 🌙')">Yes 😊</button>
                            <button onclick="showReaction('Well, I tried! Have some biryani! 🍛')">Maybe 🤔</button>
                            <button onclick="showReaction('Send your bKash/Bank details first! 💸😂')">Send Eidi 😂</button>
                        </div>
                    </div>
                </div>

                <div class="card-actions">
                    <button class="btn btn-outline" onclick="goToGenerator()" style="color: white; border-color: white;">Create Your Own Card</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Data variables
        let friendName = "";
        let senderName = "";
        let customMsg = "";
        let generatedUrl = "";

        // Parse URL Parameters
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('name')) {
                friendName = urlParams.get('name');
                senderName = urlParams.get('from') || 'Someone Special';
                customMsg = urlParams.get('msg') || "Someone made this magical Eid card just for you. Wishing you a day filled with joy, peace, and delicious food!";
                
                document.getElementById('display-friend-intro').innerText = friendName;
                document.getElementById('display-sender').innerText = senderName;
                
                document.getElementById('card-view').classList.remove('hidden');
                document.getElementById('generator-view').classList.add('hidden');
            } else {
                document.getElementById('generator-view').classList.remove('hidden');
                // Fake dynamic counter
                document.getElementById('card-counter').innerText = `✨ ${Math.floor(Math.random() * 500) + 1200}`;
            }
        };

        // --- Generator Functions ---
        function generateLink() {
            const nameInput = document.getElementById('friend-name').value.trim();
            const senderInput = document.getElementById('sender-name').value.trim();
            const msgInput = document.getElementById('custom-msg').value.trim();

            if (!nameInput) {
                alert("Please enter your friend's name!");
                return;
            }

            const baseUrl = window.location.origin + window.location.pathname;
            const params = new URLSearchParams();
            params.append('name', nameInput);
            if (senderInput) params.append('from', senderInput);
            if (msgInput) params.append('msg', msgInput);

            generatedUrl = `${baseUrl}?${params.toString()}`;
            
            document.getElementById('generated-link').innerText = generatedUrl;
            document.getElementById('share-section').classList.remove('hidden');
        }

        function copyLink() {
            navigator.clipboard.writeText(generatedUrl).then(() => {
                alert("Link copied to clipboard! Share it with your friend.");
            });
        }

        function shareNative() {
            if (navigator.share) {
                navigator.share({
                    title: 'A Special Eid Card for You!',
                    text: 'I made a magical Eid card for you. Open it here: ',
                    url: generatedUrl,
                }).catch(console.error);
            } else {
                alert("Native sharing is not supported on this browser. Please use the Copy Link button.");
            }
        }

        // --- Card Animation Functions ---
        function openCard() {
            // Play Music
            const audio = document.getElementById('bg-music');
            audio.volume = 0.4;
            audio.play().catch(e => console.log("Audio autoplay prevented"));

            // Swap views
            document.getElementById('card-intro').classList.add('hidden');
            document.getElementById('card-inside').classList.remove('hidden');

            // Start typing effect
            typeMessage(`Eid Mubarak ${friendName}!\n\n${customMsg}`);
        }

        function typeMessage(text) {
            const target = document.getElementById('typed-text');
            target.innerHTML = '';
            let i = 0;
            const speed = 40; // typing speed in ms

            function typeWriter() {
                if (i < text.length) {
                    if (text.charAt(i) === '\n') {
                        target.innerHTML += '<br>';
                    } else {
                        target.innerHTML += text.charAt(i);
                    }
                    i++;
                    setTimeout(typeWriter, speed);
                }
            }
            // Add a slight delay before typing starts
            setTimeout(typeWriter, 500);
        }

        function goToGenerator() {
            window.location.href = window.location.origin + window.location.pathname;
        }

        function showReaction(msg) {
            alert(msg);
        }

        // --- Interactive Particle Effects (No Libraries Needed) ---
        function createStars(event) {
            createParticles(event.clientX, event.clientY, ['✨', '🌟', '🌙'], 10);
        }

        function triggerConfetti(event) {
            const colors = ['#F9A03F', '#F7D08A', '#ffffff', '#e88a1a'];
            createParticles(event.clientX, event.clientY, colors, 30, true);
        }

        function createParticles(x, y, items, count, isColorDiv = false) {
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                if (isColorDiv) {
                    particle.style.width = '10px';
                    particle.style.height = '10px';
                    particle.style.backgroundColor = items[Math.floor(Math.random() * items.length)];
                    particle.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                } else {
                    particle.innerText = items[Math.floor(Math.random() * items.length)];
                    particle.style.fontSize = (Math.random() * 15 + 10) + 'px';
                }

                // Random horizontal spread
                const spreadX = (Math.random() - 0.5) * 200;
                particle.style.left = (x + spreadX) + 'px';
                particle.style.top = y + 'px';
                
                // Random fall speed
                const duration = Math.random() * 2 + 2;
                particle.style.animationDuration = duration + 's';

                document.body.appendChild(particle);

                // Clean up DOM after animation
                setTimeout(() => {
                    particle.remove();
                }, duration * 1000);
            }
        }
    </script>
</body>
</html>
