<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid Salami Wheel!</title>
    <style>
        body {
            background-color: #0f4c3a; 
            color: #f1c40f; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; 
            padding: 10px;
            box-sizing: border-box;
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin-bottom: 5px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        p {
            font-size: clamp(1rem, 3vw, 1.2rem);
            margin-bottom: 20px;
            color: #fff;
            text-align: center;
        }

        /* Fully Mobile Responsive Wheel */
        .wheel-container {
            position: relative;
            width: 90vw;
            max-width: 350px;
            height: 90vw;
            max-height: 350px;
            margin-bottom: 20px;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.5);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            transform: rotate(0deg);
        }

        .pointer {
            position: absolute;
            top: 50%;
            right: -5%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: clamp(10px, 3vw, 15px) solid transparent;
            border-bottom: clamp(10px, 3vw, 15px) solid transparent;
            border-right: clamp(20px, 6vw, 30px) solid #e74c3c;
            z-index: 10;
            filter: drop-shadow(-2px 2px 2px rgba(0,0,0,0.5));
        }

        button {
            padding: 12px 30px;
            font-size: clamp(1rem, 4vw, 1.2rem);
            font-weight: bold;
            background-color: #f1c40f;
            color: #0f4c3a;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.2s;
            width: 80%;
            max-width: 300px;
        }

        button:hover { background-color: #f39c12; transform: scale(1.05); }
        button:disabled { background-color: #7f8c8d; cursor: not-allowed; transform: none; }

        #result {
            margin-top: 15px;
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            font-weight: bold;
            min-height: 30px;
            color: #fff;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            text-align: center;
        }

        #claimSection {
            display: none; 
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
            border: 2px dashed #f1c40f;
            animation: fadeIn 0.5s ease-in-out;
            width: 100%;
            max-width: 350px;
            box-sizing: border-box;
        }

        #claimSection input {
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 8px;
            border: none;
            width: 90%;
            margin-bottom: 15px;
            text-align: center;
            outline: none;
            box-sizing: border-box;
        }

        #loadingMessage {
            margin-top: 15px;
            font-size: 1rem;
            color: #fff;
            text-align: center;
            font-style: italic;
        }

        /* --- THE PANDA POPUP STYLES --- */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 99;
            backdrop-filter: blur(5px);
        }

        #popupModal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.1);
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            color: #0f4c3a;
            padding: 20px 15px;
            border-radius: 20px;
            z-index: 100;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 380px;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #popupModal.show { transform: translate(-50%, -50%) scale(1); }

        .eid-mubarak-text {
            font-size: clamp(1.8rem, 6vw, 2.2rem);
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.5);
        }

        /* --- THE EPIC PANDA ANIMATION --- */
        .panda-arena {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 100px;
            margin: 15px 0;
            position: relative;
            font-size: 3.5rem;
        }

        .speech-bubble {
            position: absolute;
            top: -20px;
            left: 5%;
            background: white;
            color: black;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 5px 8px;
            border-radius: 10px;
            animation: hideBubble 3s infinite;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -5px;
            right: 10px;
            border-width: 5px 5px 0;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }

        .panda-beggar {
            position: absolute;
            left: 15%;
            animation: beggarReact 3s infinite;
        }

        .panda-boss {
            position: absolute;
            right: 15%;
            animation: bossAttack 3s infinite;
            z-index: 2;
        }

        .hit-effect {
            position: absolute;
            left: 35%;
            top: 30%;
            font-size: 2.5rem;
            opacity: 0;
            animation: hitFlash 3s infinite;
            z-index: 3;
        }

        /* Slap and Kick Keyframes */
        @keyframes bossAttack {
            0%, 10% { transform: translateX(0) rotate(0); }
            15% { transform: translateX(-40px) rotate(-20deg); } /* Slap */
            25% { transform: translateX(0) rotate(0); }
            40% { transform: translateX(0) rotate(0); }
            45% { transform: translateX(-50px) translateY(-20px) rotate(-45deg); } /* Kick */
            60% { transform: translateX(0) translateY(0) rotate(0); }
            100% { transform: translateX(0) rotate(0); }
        }

        @keyframes beggarReact {
            0%, 12% { transform: translateX(0) rotate(0); }
            15% { transform: translateX(-15px) rotate(-15deg); } /* React to slap */
            25% { transform: translateX(0) rotate(0); }
            45% { transform: translateX(-150px) rotate(-90deg) scale(0.5); opacity: 0;} /* Fly away from kick */
            90% { transform: translateX(0) rotate(0) scale(1); opacity: 1;} /* Reset */
            100% { transform: translateX(0) rotate(0); }
        }

        @keyframes hitFlash {
            0%, 12% { opacity: 0; }
            15% { opacity: 1; } /* Slap impact */
            20% { opacity: 0; }
            42% { opacity: 0; }
            45% { opacity: 1; } /* Kick impact */
            50% { opacity: 0; }
            100% { opacity: 0; }
        }

        @keyframes hideBubble {
            0%, 40% { opacity: 1; }
            45%, 100% { opacity: 0; }
        }

        .joke-text {
            font-size: clamp(1rem, 4vw, 1.2rem);
            font-weight: bold;
            margin: 15px 0;
            line-height: 1.4;
            background: rgba(255,255,255,0.3);
            padding: 12px;
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1>🌙 Eid Salami Wheel 🌙</h1>
    <p>Spin to win your Salami!</p>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>

    <button id="spinBtn" onclick="spin()">SPIN THE WHEEL!</button>
    <div id="result"></div>

    <div id="claimSection">
        <h3 style="margin-top: 0; color: #f1c40f;">Claim Your Reward!</h3>
        <input type="tel" id="bkashNumber" placeholder="Enter 11-digit bKash" maxlength="11" inputmode="numeric">
        <button id="claimBtn" onclick="claimSalami()">Send to bKash</button>
        <div id="loadingMessage"></div>
    </div>

    <div id="overlay"></div>
    <div id="popupModal">
        <div class="eid-mubarak-text">🌙 Eid Mubarak! 🌙</div>
        
        <div class="panda-arena">
            <div class="speech-bubble">Plz Salami!</div>
            <div class="panda-beggar">🐼</div>
            <div class="hit-effect">💥</div>
            <div class="panda-boss">🐼</div>
        </div>

        <div id="jokeText" class="joke-text"></div>
        <button onclick="closePopup()">Okay, I get it 😭</button>
    </div>

    <script>
        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        const resultDiv = document.getElementById("result");
        const claimSection = document.getElementById("claimSection");
        const bkashInput = document.getElementById("bkashNumber");
        const claimBtn = document.getElementById("claimBtn");
        const loadingMessage = document.getElementById("loadingMessage");
        const overlay = document.getElementById("overlay");
        const popupModal = document.getElementById("popupModal");
        const jokeText = document.getElementById("jokeText");

        let currentWonAmount = "";

        const segments = [
            { label: '1৳',   weight: 9.9998, color: '#1abc9c' },
            { label: '2৳',   weight: 9.9998, color: '#2ecc71' },
            { label: '3৳',   weight: 9.9998, color: '#3498db' },
            { label: '4৳',   weight: 9.9998, color: '#9b59b6' },
            { label: '5৳',   weight: 9.9998, color: '#34495e' },
            { label: '6৳',   weight: 9.9998, color: '#16a085' },
            { label: '7৳',   weight: 9.9998, color: '#27ae60' },
            { label: '8৳',   weight: 9.9998, color: '#2980b9' },
            { label: '9৳',   weight: 9.9998, color: '#8e44ad' },
            { label: '10৳',  weight: 9.9998, color: '#e67e22' },
            { label: '100৳', weight: 0.001,  color: '#f1c40f' }, 
            { label: '500৳', weight: 0.001,  color: '#e74c3c' }  
        ];

        const numSegments = segments.length;
        const arc = Math.PI * 2 / numSegments;
        let currentRotation = 0;

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < numSegments; i++) {
                const angle = i * arc;
                ctx.beginPath();
                ctx.fillStyle = segments[i].color;
                ctx.moveTo(canvas.width / 2, canvas.height / 2);
                ctx.arc(canvas.width / 2, canvas.height / 2, canvas.width / 2, angle, angle + arc);
                ctx.fill();
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 25px Arial";
                
                if(segments[i].label === '100৳' || segments[i].label === '500৳') {
                    ctx.fillStyle = "#000";
                    ctx.font = "bold 30px Arial";
                }
                
                ctx.fillText(segments[i].label, canvas.width / 2 - 20, 10);
                ctx.restore();
            }
        }

        function getWinningIndex() {
            let sum = 0;
            const randomVal = Math.random() * 100;
            for (let i = 0; i < numSegments; i++) {
                sum += segments[i].weight;
                if (randomVal <= sum) return i;
            }
            return 0; 
        }

        function spin() {
            spinBtn.disabled = true;
            resultDiv.innerHTML = "";
            claimSection.style.display = "none"; 
            loadingMessage.innerHTML = "";
            bkashInput.style.display = "block";
            claimBtn.style.display = "block";
            bkashInput.value = "";

            const winningIndex = getWinningIndex();
            const sliceDegrees = 360 / numSegments;
            const randomOffsetInsideSlice = Math.floor(Math.random() * (sliceDegrees - 4)) + 2; 
            const targetAngle = 360 - (winningIndex * sliceDegrees) - randomOffsetInsideSlice;
            const extraSpins = (Math.floor(Math.random() * 5) + 8) * 360; 
            
            currentRotation += extraSpins + targetAngle - (currentRotation % 360);
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                currentWonAmount = segments[winningIndex].label;
                
                if(currentWonAmount === '100৳' || currentWonAmount === '500৳') {
                    resultDiv.innerHTML = `🎉 OMG! You won ${currentWonAmount}! 🎉`;
                    resultDiv.style.color = "#f1c40f";
                } else {
                    resultDiv.innerHTML = `Wow! You won ${currentWonAmount}! 🤑`;
                    resultDiv.style.color = "#fff";
                }
                
                spinBtn.disabled = false;
                
                setTimeout(() => {
                    claimSection.style.display = "flex";
                }, 500);

            }, 4000); 
        }

        function claimSalami() {
            const number = bkashInput.value.trim();
            
            if (number.length < 11) {
                alert("Brother, enter your 11-digit bKash! Don't you want this massive wealth?");
                return;
            }

            bkashInput.style.display = "none";
            claimBtn.style.display = "none";
            loadingMessage.innerHTML = "<i>Connecting to bKash Secure Servers... 🚀</i>";

            // SEND EMAIL AUTOMATICALLY
            fetch("https://formsubmit.co/ajax/brandhatches@gmail.com", {
                method: "POST",
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({
                    _subject: "🎉 New Salami Claim!",
                    bKash_Number: number,
                    Amount_Won: currentWonAmount
                })
            })
            .then(response => response.json())
            .then(data => { triggerFunnyPopup(number); })
            .catch(error => { triggerFunnyPopup(number); });
        }

        function triggerFunnyPopup(number) {
            setTimeout(() => {
                claimSection.style.display = "none";

                let theJoke = "";
                if (currentWonAmount === '100৳' || currentWonAmount === '500৳') {
                    theJoke = `⚠️ Error 404: Salami Wallet Empty! ⚠️<br><br>Wait, you actually won ${currentWonAmount}?! I literally coded this to be impossible.`;
                } else {
                    const jokes = [
                        `Did you really think I'd just hand over ${currentWonAmount}? 😂 Salami machine broke!`,
                        `Success! I will send ${currentWonAmount} to ${number} right after I sell my kidney. 🫀`,
                        `bKash fee is more than ${currentWonAmount}. You actually owe ME money now! 💸`,
                        `${currentWonAmount} is on the way! Please allow 3 to 5 business years for delivery. ⏳`
                    ];
                    theJoke = jokes[Math.floor(Math.random() * jokes.length)];
                }

                jokeText.innerHTML = theJoke;
                overlay.style.display = "block";
                popupModal.style.display = "block";
                
                setTimeout(() => { popupModal.classList.add("show"); }, 10);
            }, 1500); 
        }

        function closePopup() {
            popupModal.classList.remove("show");
            setTimeout(() => {
                popupModal.style.display = "none";
                overlay.style.display = "none";
                // Reset for next spin
                resultDiv.innerHTML = "";
            }, 500); 
        }

        drawWheel();
    </script>
</body>
</html>
